name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Migration guard
        shell: pwsh
        run: ./server/scripts/check-migration-guard.ps1

      - name: Backend tests
        working-directory: server
        shell: pwsh
        run: go test -buildvcs=false ./internal/...

      - name: Frontend build
        working-directory: server/frontend
        shell: pwsh
        run: |
          npm ci
          npm run build
