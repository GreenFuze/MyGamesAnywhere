name: Build Windows Release Packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve VERSION and release notes path
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must be in X.Y.Z format. Got '$version'."
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "release_notes=docs/releases/v$version.md" >> $env:GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Build portable package
        shell: pwsh
        run: ./server/package-portable.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer package and update manifest
        shell: pwsh
        run: ./server/package-installer.ps1 -SkipBuild

      - name: Ensure release notes exist
        shell: pwsh
        run: |
          $notes = "${{ steps.version.outputs.release_notes }}"
          if (-not (Test-Path $notes)) {
            throw "Missing release notes file: $notes"
          }

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mga-${{ steps.version.outputs.tag }}-windows
          path: |
            server/release/*.zip
            server/release/*.exe
            server/release/mga-update.json
            server/release/SHA256SUMS.txt
