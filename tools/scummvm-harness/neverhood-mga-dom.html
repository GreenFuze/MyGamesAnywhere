<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Neverhood Chronicles</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #f4f4f5;
        font-family: system-ui, sans-serif;
      }
      body {
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.2), transparent 40%),
          linear-gradient(180deg, #1d1102 0%, #000 65%);
      }
      #progress {
        position: fixed;
        inset: 0 auto auto 0;
        width: 100%;
        height: 10px;
        appearance: none;
        border: 0;
        background: #3f2a04;
        z-index: 2;
      }
      #progress::-moz-progress-bar {
        background: #fbbf24;
      }
      #progress::-webkit-progress-value {
        background: #fbbf24;
      }
      #status {
        position: fixed;
        right: 0;
        bottom: 3rem;
        max-width: min(32rem, calc(100vw - 2rem));
        padding: 0.85rem 1rem 0.85rem 1.25rem;
        border: 2px solid rgba(0, 0, 0, 0.75);
        border-right: 0;
        border-radius: 1rem 0 0 1rem;
        background: rgba(251, 191, 36, 0.92);
        color: #1c1917;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.45;
        z-index: 3;
      }
      #status.error {
        background: rgba(185, 28, 28, 0.94);
        color: #fff1f2;
      }
      #status[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <progress id="progress" hidden="" max="100" value="0"></progress>
    <div id="status" class="" hidden=""></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" width="640" height="480" style="cursor: none;"></canvas>

    <script type="module">
      const CONFIG_TEXT = `[scummvm]
pluginspath=/plugins
extrapath=/data
iconspath=/data
themepath=/data
savepath=/local/saves
gui_launcher_chooser=grid
`

      const params = new URLSearchParams(window.location.search)
      const sessionId = params.get('session')
      const progressElement = document.getElementById('progress')
      const statusElement = document.getElementById('status')
      const canvas = document.getElementById('canvas')
      const runtimeOrigin = window.location.origin
      const sessionKey = sessionId ? `mga.browserPlaySession.${sessionId}` : null
      const rawSession = sessionKey ? sessionStorage.getItem(sessionKey) : null
      const runtimeAssetVersion = sessionId ? encodeURIComponent(sessionId) : `${Date.now()}`
      let ScummvmFS = null
      let hasPersistentLocalStorage = false

      function setStatus(text, isError = false) {
        const normalizedText = typeof text === 'string' ? text.trim() : ''
        const shouldHide = !isError && (normalizedText === '' || normalizedText === 'Ready.')
        statusElement.hidden = shouldHide
        statusElement.textContent = shouldHide ? '' : normalizedText
        statusElement.className = isError ? 'error' : ''
      }

      function postBridgeMessage(message) {
        window.parent.postMessage(message, runtimeOrigin)
      }

      function bytesToBase64(bytes) {
        let binary = ''
        for (let index = 0; index < bytes.length; index += 1) {
          binary += String.fromCharCode(bytes[index])
        }
        return btoa(binary)
      }

      function base64ToBytes(base64) {
        const binary = atob(base64)
        const bytes = new Uint8Array(binary.length)
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index)
        }
        return bytes
      }

      function normalizePath(path) {
        return path.replaceAll('\\', '/').replace(/^\.\/+/, '').replace(/^\/+/, '')
      }

      function stripLaunchPrefix(path, prefix) {
        const normalizedPath = normalizePath(path)
        const normalizedPrefix = normalizePath(prefix)
        if (!normalizedPrefix) return normalizedPath
        if (normalizedPath === normalizedPrefix) return ''
        if (normalizedPath.startsWith(`${normalizedPrefix}/`)) {
          return normalizedPath.slice(normalizedPrefix.length + 1)
        }
        return normalizedPath
      }

      function flattenIndexEntries(tree, prefix = '') {
        const files = []
        for (const [name, value] of Object.entries(tree ?? {})) {
          if (name === 'index.json') continue
          const relativePath = prefix ? `${prefix}/${name}` : name
          if (value && typeof value === 'object') {
            files.push(...flattenIndexEntries(value, relativePath))
          } else {
            files.push(relativePath)
          }
        }
        return files
      }

      function ensureDir(targetPath) {
        const normalized = targetPath.replace(/\/+/g, '/')
        const parts = normalized.split('/').filter(Boolean)
        let current = ''
        for (const part of parts) {
          current += `/${part}`
          if (!FS.analyzePath(current).exists) {
            FS.mkdir(current)
          }
        }
      }

      async function fetchBinaryAsset(sourcePath) {
        const separator = sourcePath.includes('?') ? '&' : '?'
        const response = await fetch(`${sourcePath}${separator}v=${runtimeAssetVersion}`, {
          cache: 'no-store',
        })
        if (!response.ok) {
          throw new Error(`Unable to fetch ${sourcePath}: ${response.status}`)
        }
        return new Uint8Array(await response.arrayBuffer())
      }

      async function preloadRuntimeAssets(session) {
        setStatus('Loading ScummVM runtime manifest...')
        const indexResponse = await fetch(`./data/index.json?v=${runtimeAssetVersion}`, {
          cache: 'no-store',
        })
        if (!indexResponse.ok) {
          throw new Error(`Unable to load ScummVM data index: ${indexResponse.status}`)
        }

        const dataFiles = flattenIndexEntries(await indexResponse.json())
        const assetSpecs = dataFiles.map((relativePath) => ({
          source: `./data/${relativePath}`,
          target: `/data/${relativePath}`,
        }))

        if (typeof session.enginePluginFileName === 'string' && session.enginePluginFileName.length > 0) {
          assetSpecs.push({
            source: `./plugins/${session.enginePluginFileName}`,
            target: `/plugins/${session.enginePluginFileName}`,
          })
        }

        const payloads = []
        for (let index = 0; index < assetSpecs.length; index += 1) {
          const asset = assetSpecs[index]
          setStatus(`Loading ScummVM runtime assets (${index + 1}/${assetSpecs.length}): ${asset.target}`)
          payloads.push({
            ...asset,
            buffer: await fetchBinaryAsset(asset.source),
          })
        }
        return payloads
      }

      function listFilesRecursive(rootPath) {
        const files = []
        const entries = FS.readdir(rootPath)
        for (const entry of entries) {
          if (entry === '.' || entry === '..') continue
          const fullPath = `${rootPath}/${entry}`.replace(/\/+/g, '/')
          const stat = FS.stat(fullPath)
          if (FS.isDir(stat.mode)) {
            files.push(...listFilesRecursive(fullPath))
          } else {
            files.push(fullPath)
          }
        }
        return files
      }

      function resolvePersistentLocalFilesystem() {
        if (typeof IDBFS !== 'undefined') return IDBFS
        if (typeof FS !== 'undefined' && FS && typeof FS === 'object') {
          return FS.filesystems?.IDBFS ?? null
        }
        return null
      }

      function exportSaveSnapshot(requestId) {
        try {
          const publishSnapshot = () => {
            const files = listFilesRecursive('/local/saves').map((filePath) => ({
              path: filePath.replace(/^\/local\/saves\/?/, ''),
              base64: bytesToBase64(FS.readFile(filePath)),
            }))
            postBridgeMessage({ type: 'export-result', requestId, snapshot: { files } })
          }

          if (hasPersistentLocalStorage && typeof FS.syncfs === 'function') {
            FS.syncfs(false, (error) => {
              if (error) {
                postBridgeMessage({ type: 'export-result', requestId, error: String(error) })
                return
              }
              publishSnapshot()
            })
            return
          }

          publishSnapshot()
        } catch (error) {
          postBridgeMessage({
            type: 'export-result',
            requestId,
            error: error instanceof Error ? error.message : 'Unable to export ScummVM saves.',
          })
        }
      }

      function removeExistingSaveTree(rootPath) {
        const entries = FS.readdir(rootPath)
        for (const entry of entries) {
          if (entry === '.' || entry === '..') continue
          const fullPath = `${rootPath}/${entry}`.replace(/\/+/g, '/')
          const stat = FS.stat(fullPath)
          if (FS.isDir(stat.mode)) {
            removeExistingSaveTree(fullPath)
            FS.rmdir(fullPath)
          } else {
            FS.unlink(fullPath)
          }
        }
      }

      function importSaveSnapshot(requestId, files) {
        try {
          removeExistingSaveTree('/local/saves')
          for (const file of files ?? []) {
            const mountPath = `/local/saves/${normalizePath(file.path)}`.replace(/\/+/g, '/')
            const parent = mountPath.replace(/\/[^/]+$/, '')
            if (parent) ensureDir(parent)
            FS.writeFile(mountPath, base64ToBytes(file.base64), { canOwn: true })
          }
          if (hasPersistentLocalStorage && typeof FS.syncfs === 'function') {
            FS.syncfs(false, (error) => {
              if (error) {
                postBridgeMessage({ type: 'import-result', requestId, ok: false, error: String(error) })
                return
              }
              postBridgeMessage({ type: 'import-result', requestId, ok: true })
            })
            return
          }
          postBridgeMessage({ type: 'import-result', requestId, ok: true })
        } catch (error) {
          postBridgeMessage({
            type: 'import-result',
            requestId,
            ok: false,
            error: error instanceof Error ? error.message : 'Unable to import ScummVM saves.',
          })
        }
      }

      window.addEventListener('message', (event) => {
        if (event.origin !== runtimeOrigin) return
        const message = event.data
        if (!message || typeof message !== 'object' || !('type' in message)) return
        if (message.type === 'export-save-snapshot') {
          exportSaveSnapshot(message.requestId)
        } else if (message.type === 'import-save-snapshot') {
          importSaveSnapshot(message.requestId, message.files)
        }
      })

      function configureStatusHooks(module) {
        module.setStatus = function (text) {
          if (!module.setStatus.last) {
            module.setStatus.last = { time: Date.now(), text: '' }
          }
          if (text === module.setStatus.last.text) return

          const match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/)
          const now = Date.now()
          if (match && now - module.setStatus.last.time < 30) return

          module.setStatus.last = { time: now, text }
          if (match) {
            progressElement.hidden = false
            progressElement.value = Number.parseInt(match[2], 10)
            progressElement.max = Number.parseInt(match[4], 10)
            setStatus(match[1].trim())
            return
          }

          progressElement.hidden = true
          setStatus(text && text.length > 0 ? text : 'Ready.')
        }
      }

      if (!sessionId || !rawSession) {
        progressElement.hidden = true
        setStatus('Unable to launch ScummVM: browser-play session was not found.', true)
      } else {
        ;({ ScummvmFS } = await import(`./scummvm_fs.js?v=${runtimeAssetVersion}`))
        const session = JSON.parse(rawSession)
        if (session.runtime !== 'scummvm') {
          progressElement.hidden = true
          setStatus('Unable to launch ScummVM: invalid runtime session.', true)
        } else {
          const launchRoot = '/games/game'
          const launchPrefix = normalizePath(session.launchDirectoryPath ?? '')
          const launchFiles = session.files.map((file) => ({
            ...file,
            relativePath: stripLaunchPrefix(file.path, launchPrefix),
          }))
          const runtimeSupportPayloads = await preloadRuntimeAssets(session)

          const launchArgs = [
            `--path=${launchRoot}`,
            '--auto-detect',
            '--extrapath=/data',
            '--iconspath=/data',
            '--themepath=/data',
            '--savepath=/local/saves',
          ]
          window.location.hash = encodeURI(launchArgs.join(' '))

          let syncInterval = null
          let launchFailure = null

          function syncLocal(fsSync) {
            if (!hasPersistentLocalStorage) return
            try {
              fsSync(false, () => {})
            } catch (error) {
              console.warn('Failed to sync ScummVM local data.', error)
            }
          }

          function finalizeLocalFilesystem() {
            ensureDir('/local/saves')
            if (!FS.analyzePath('/local/scummvm.ini').exists) {
              FS.writeFile('/local/scummvm.ini', CONFIG_TEXT)
            }
            if (hasPersistentLocalStorage && syncInterval === null) {
              syncInterval = window.setInterval(() => syncLocal(FS.syncfs.bind(FS)), 15000)
            }
            postBridgeMessage({ type: 'ready', saveAdapter: true })
            removeRunDependency('mga-scummvm-local')
          }

          function setupStaticFilesystem() {
            ensureDir('/data')
            ensureDir('/plugins')
            for (const asset of runtimeSupportPayloads) {
              const parent = asset.target.replace(/\/[^/]+$/, '')
              if (parent) {
                ensureDir(parent)
              }
              FS.writeFile(asset.target, asset.buffer, { canOwn: true })
            }
            if (!(typeof session.enginePluginFileName === 'string' && session.enginePluginFileName.length > 0)) {
              FS.mount(new ScummvmFS(FS, './plugins'), { root: '/' }, '/plugins')
            }
          }

          function setupLocalFilesystem() {
            addRunDependency('mga-scummvm-local')
            ensureDir('/local')
            const persistentFilesystem = resolvePersistentLocalFilesystem()
            hasPersistentLocalStorage = Boolean(persistentFilesystem && typeof FS.syncfs === 'function')
            if (!hasPersistentLocalStorage) {
              finalizeLocalFilesystem()
              return
            }

            FS.mount(persistentFilesystem, {}, '/local')
            FS.syncfs(true, (error) => {
              if (error) {
                launchFailure = error
                setStatus(`Unable to initialize local save storage: ${error}`, true)
                removeRunDependency('mga-scummvm-local')
                return
              }

              finalizeLocalFilesystem()
              FS.syncfs(false, () => {})
            })
          }

          function setupGameFilesystem() {
            ensureDir('/games')
            FS.mount(
              new ScummvmFS(FS, {
                files: launchFiles.map((file) => ({
                  path: `game/${file.relativePath}`.replace(/\/+/g, '/'),
                  size: file.size,
                  url: file.url,
                })),
              }),
              { root: '/' },
              '/games',
            )
            setStatus(`Mounted ${launchFiles.length} ScummVM game files.`)
          }

          window.addEventListener('beforeunload', () => {
            if (typeof FS !== 'undefined' && FS && typeof FS.syncfs === 'function') {
              syncLocal(FS.syncfs.bind(FS))
            }
            if (syncInterval !== null) {
              window.clearInterval(syncInterval)
            }
          })

          window.Module = {
            preRun: [setupStaticFilesystem, setupLocalFilesystem, setupGameFilesystem],
            postRun: [],
            canvas,
            locateFile(path) {
              return `./${path}`
            },
            print(message) {
              console.log(message)
            },
            printErr(message) {
              console.error(message)
            },
            onAbort(message) {
              setStatus(`ScummVM aborted: ${message}`, true)
            },
          }

          configureStatusHooks(window.Module)
          window.Module.setStatus('Downloading ScummVM...')
          window.onerror = function () {
            progressElement.hidden = true
            if (launchFailure) {
              setStatus(
                `Unable to launch ScummVM: ${launchFailure instanceof Error ? launchFailure.message : String(launchFailure)}`,
                true,
              )
            } else {
              setStatus('ScummVM hit a runtime error. Check the browser console for details.', true)
            }
          }

          const runtimeScript = document.createElement('script')
          runtimeScript.src = `./scummvm.js?v=${runtimeAssetVersion}`
          runtimeScript.async = true
          document.body.appendChild(runtimeScript)
        }
      }
    </script>
  

<script src="./scummvm.js?v=mga-harness-session" async=""></script></body></html>
