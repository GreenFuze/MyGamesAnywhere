<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MGA ScummVM Runtime Launcher</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #050505;
        color: #f5f5f5;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        display: grid;
        place-items: center;
      }
      pre {
        max-width: min(64rem, calc(100vw - 2rem));
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <pre id="status">Preparing MGA ScummVM runtime launch...</pre>
    <script type="module">
      const status = document.getElementById('status')

      function setStatus(text) {
        status.textContent = text
      }

      try {
        const response = await fetch(`/manifest?v=${Date.now()}`, { cache: 'no-store' })
        if (!response.ok) {
          throw new Error(`Manifest request failed: ${response.status}`)
        }

        const manifest = await response.json()
        const sessionId = 'mga-harness-session'
        sessionStorage.setItem(
          `mga.browserPlaySession.${sessionId}`,
          JSON.stringify({
            runtime: 'scummvm',
            title: manifest.title,
            sourceGameId: 'harness-source',
            launchDirectoryPath: manifest.launchDirectoryPath ?? '',
            enginePluginFileName: manifest.enginePluginFileName,
            files: manifest.files.map((file) => ({
              id: file.path,
              path: file.path,
              role: 'content',
              size: file.size,
              url: file.url,
            })),
          }),
        )

        setStatus('Launching actual MGA ScummVM player...')
        window.location.replace(`/runtime/player.html?session=${encodeURIComponent(sessionId)}`)
      } catch (error) {
        setStatus(error instanceof Error ? error.stack ?? error.message : String(error))
      }
    </script>
  </body>
</html>
