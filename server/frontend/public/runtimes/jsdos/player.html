<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>js-dos Player</title>
    <link rel="stylesheet" href="./js-dos.css" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #f4f4f5;
        font-family: system-ui, sans-serif;
      }
      body {
        overflow: hidden;
      }
      #player {
        width: 100%;
        height: 100%;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, #202020, #050505 70%);
        text-align: center;
      }
      .status {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 36rem;
      }
      .error {
        color: #fecaca;
      }
      .muted {
        color: #a1a1aa;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <div id="overlay" class="overlay">
      <div class="status">
        <strong id="status-title">Preparing DOS runtime...</strong>
        <span id="status-text" class="muted">Loading launch session.</span>
      </div>
    </div>
    <script src="./js-dos.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search)
      const sessionId = params.get('session')
      const overlay = document.getElementById('overlay')
      const statusTitle = document.getElementById('status-title')
      const statusText = document.getElementById('status-text')
      const player = document.getElementById('player')
      const runtimeOrigin = window.location.origin
      let activeDos = null
      let currentSession = null

      function setStatus(title, detail, isError = false) {
        statusTitle.textContent = title
        statusText.textContent = detail
        statusText.className = isError ? 'error' : 'muted'
      }

      function postBridgeMessage(message) {
        window.parent.postMessage(message, runtimeOrigin)
      }

      function bytesToBase64(bytes) {
        const view = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes)
        let binary = ''
        for (let index = 0; index < view.length; index += 1) {
          binary += String.fromCharCode(view[index])
        }
        return btoa(binary)
      }

      function base64ToBytes(base64) {
        const binary = atob(base64)
        const bytes = new Uint8Array(binary.length)
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index)
        }
        return bytes
      }

      window.addEventListener('message', async (event) => {
        if (event.origin !== runtimeOrigin) return
        const message = event.data
        if (!message || typeof message !== 'object' || !('type' in message)) return

        if (message.type === 'export-save-snapshot') {
          try {
            if (!activeDos || typeof activeDos.save !== 'function') {
              throw new Error('This js-dos session does not support save export.')
            }
            const bundle = await activeDos.save()
            postBridgeMessage({
              type: 'export-result',
              requestId: message.requestId,
              snapshot: {
                files: [{ path: 'bundle-changes.jsdos', base64: bytesToBase64(bundle) }],
              },
            })
          } catch (error) {
            postBridgeMessage({
              type: 'export-result',
              requestId: message.requestId,
              error: error instanceof Error ? error.message : 'Unable to export js-dos changes.',
            })
          }
          return
        }

        if (message.type === 'import-save-snapshot') {
          try {
            const file = Array.isArray(message.files) ? message.files[0] : null
            if (!file?.base64 || !currentSession?.bundleUrl) {
              throw new Error('This js-dos session requires a bundle-backed launch to import saves.')
            }
            currentSession.importedBundleBase64 = file.base64
            sessionStorage.setItem(`mga.browserPlaySession.${sessionId}`, JSON.stringify(currentSession))
            postBridgeMessage({ type: 'import-result', requestId: message.requestId, ok: true })
            window.setTimeout(() => window.location.reload(), 50)
          } catch (error) {
            postBridgeMessage({
              type: 'import-result',
              requestId: message.requestId,
              ok: false,
              error: error instanceof Error ? error.message : 'Unable to import js-dos changes.',
            })
          }
        }
      })

      function normalizePath(path) {
        return path.replaceAll('\\', '/').replace(/^\.\/+/, '').replace(/^\/+/, '')
      }

      function stripLaunchPrefix(path, prefix) {
        const normalizedPath = normalizePath(path)
        const normalizedPrefix = normalizePath(prefix)
        if (!normalizedPrefix) return normalizedPath
        if (normalizedPath === normalizedPrefix) return ''
        if (normalizedPath.startsWith(`${normalizedPrefix}/`)) {
          return normalizedPath.slice(normalizedPrefix.length + 1)
        }
        return normalizedPath
      }

      function normalizeDosPath(path) {
        return normalizePath(path).replaceAll('/', '\\')
      }

      function splitDosPath(path) {
        const normalized = normalizeDosPath(path)
        const lastSlash = normalized.lastIndexOf('\\')
        if (lastSlash === -1) {
          return { dir: '', file: normalized }
        }
        return {
          dir: normalized.slice(0, lastSlash),
          file: normalized.slice(lastSlash + 1),
        }
      }

      async function fetchFile(file, index, total, launchPrefix) {
        setStatus('Preparing DOS runtime...', `Downloading ${index + 1}/${total}: ${file.path}`)
        const response = await fetch(file.url)
        if (!response.ok) {
          throw new Error(`Failed to load ${file.path}: HTTP ${response.status}`)
        }
        const relativePath = stripLaunchPrefix(file.path, launchPrefix)
        return {
          path: normalizePath(relativePath),
          contents: new Uint8Array(await response.arrayBuffer()),
        }
      }

      async function boot() {
        if (!sessionId) {
          setStatus('Unable to launch', 'Missing browser-play session token.', true)
          return
        }

        const raw = sessionStorage.getItem(`mga.browserPlaySession.${sessionId}`)
        if (!raw) {
          setStatus('Unable to launch', 'Browser-play session was not found.', true)
          return
        }

        const session = JSON.parse(raw)
        currentSession = session
        if (session.runtime !== 'jsdos') {
          setStatus('Unable to launch', 'Invalid js-dos session payload.', true)
          return
        }

        const options = {
          autoStart: true,
          pathPrefix: './emulators/',
          background: '#000000',
          noCloud: true,
          noNetworking: true,
          kiosk: false,
          workerThread: true,
        }

        if (session.bundleUrl) {
          setStatus('Preparing DOS runtime...', 'Loading DOS bundle.')
          if (session.importedBundleBase64) {
            const response = await fetch(session.bundleUrl)
            if (!response.ok) {
              throw new Error(`Failed to load DOS bundle: HTTP ${response.status}`)
            }
            const baseBundle = new Uint8Array(await response.arrayBuffer())
            activeDos = window.Dos(player, {
              ...options,
              url: [baseBundle, base64ToBytes(session.importedBundleBase64)],
            })
          } else {
            activeDos = window.Dos(player, {
              ...options,
              url: session.bundleUrl,
            })
          }
          postBridgeMessage({ type: 'ready', saveAdapter: true })
          overlay.style.display = 'none'
          return
        }

        const launchPrefix = normalizePath(session.launchDirectoryPath ?? '')
        const files = []
        for (let i = 0; i < session.files.length; i += 1) {
          files.push(await fetchFile(session.files[i], i, session.files.length, launchPrefix))
        }

        const launchPath = stripLaunchPrefix(session.executablePath ?? session.rootFilePath, launchPrefix)
        const launch = splitDosPath(launchPath)
        const autoexec = [
          '@echo off',
          'mount c .',
          'c:',
          launch.dir ? `cd ${launch.dir}` : null,
          launch.file,
        ].filter(Boolean).join('\n')

        setStatus('Preparing DOS runtime...', 'Starting DOS session.')
        activeDos = window.Dos(player, {
          ...options,
          dosboxConf: `[autoexec]\n${autoexec}\n`,
          initFs: files,
        })
        postBridgeMessage({ type: 'ready', saveAdapter: false })
        overlay.style.display = 'none'
      }

      boot().catch((error) => {
        console.error(error)
        setStatus('Unable to launch', error instanceof Error ? error.message : 'Unexpected DOS launch failure.', true)
      })
    </script>
  </body>
</html>
