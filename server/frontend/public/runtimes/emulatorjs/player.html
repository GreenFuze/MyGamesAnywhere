<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EmulatorJS Player</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
      }
      body {
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      .error {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #f5f5f5;
        background: radial-gradient(circle at top, #242424, #050505 70%);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module">
      const params = new URLSearchParams(window.location.search)
      const sessionId = params.get('session')
      const mount = document.getElementById('game')

      function renderError(message) {
        mount.className = 'error'
        mount.textContent = message
      }

      if (!sessionId) {
        renderError('Missing browser-play session token.')
      } else {
        const raw = sessionStorage.getItem(`mga.browserPlaySession.${sessionId}`)
        if (!raw) {
          renderError('Browser-play session was not found.')
        } else {
          const session = JSON.parse(raw)
          if (session.runtime !== 'emulatorjs') {
            renderError('Invalid EmulatorJS session payload.')
          } else {
            window.EJS_player = '#game'
            window.EJS_core = session.core
            window.EJS_gameUrl = session.gameUrl
            window.EJS_gameName = session.gameName
            window.EJS_pathtodata = './data/'
            window.EJS_startOnLoaded = true
            window.EJS_fullscreenOnLoaded = true
            window.EJS_disableAutoLang = false
            window.EJS_DEBUG_XX = true
            await import('./data/loader.js')
          }
        }
      }
    </script>
  </body>
</html>
