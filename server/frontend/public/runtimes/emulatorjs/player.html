<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EmulatorJS Player</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
      }
      body {
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      .error {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #f5f5f5;
        background: radial-gradient(circle at top, #242424, #050505 70%);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module">
      const params = new URLSearchParams(window.location.search)
      const sessionId = params.get('session')
      const mount = document.getElementById('game')
      const runtimeOrigin = window.location.origin
      let latestSaveBase64 = null
      let latestSavePath = null
      let nativeRequestCounter = 0
      const pendingNativeRequests = new Map()
      let saveRamSyncTimer = null
      let saveRamAutoSyncTimer = null
      let saveRamSyncInFlight = false
      let pendingSaveRamPayload = null
      function scheduleResizePass() {
        window.dispatchEvent(new Event('resize'))
        window.requestAnimationFrame(() => window.dispatchEvent(new Event('resize')))
        window.setTimeout(() => window.dispatchEvent(new Event('resize')), 150)
      }

      function renderError(message) {
        mount.className = 'error'
        mount.textContent = message
      }

      function bytesToBase64(bytes) {
        let binary = ''
        for (let index = 0; index < bytes.length; index += 1) {
          binary += String.fromCharCode(bytes[index])
        }
        return btoa(binary)
      }

      function base64ToBytes(base64) {
        const binary = atob(base64)
        const bytes = new Uint8Array(binary.length)
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index)
        }
        return bytes
      }

      function postBridgeMessage(message) {
        window.parent.postMessage(message, runtimeOrigin)
      }

      function nextNativeRequestId() {
        nativeRequestCounter += 1
        return `native-${Date.now()}-${nativeRequestCounter}`
      }

      function requestParent(message, responseTypes) {
        const requestId = nextNativeRequestId()
        return new Promise((resolve) => {
          pendingNativeRequests.set(requestId, { resolve, responseTypes })
          postBridgeMessage({ ...message, requestId })
        })
      }

      function displayMessage(message) {
        try {
          window.EJS_emulator?.displayMessage?.(message)
        } catch {
          // Runtime messages are best-effort only.
        }
      }

      function saveFilePath() {
        return window.EJS_emulator?.gameManager?.getSaveFilePath?.()
      }

      function normalizeEmulatorPath(path, fallback = null) {
        const candidate = String(path || fallback || '').trim()
        if (!candidate) return null
        return candidate.startsWith('/') ? candidate : `/${candidate}`
      }

      function pathExists(path) {
        return Boolean(path && window.EJS_emulator?.gameManager?.FS?.analyzePath(path).exists)
      }

      function isDirectory(path) {
        const FS = window.EJS_emulator?.gameManager?.FS
        if (!FS || !pathExists(path)) return false
        try {
          return FS.isDir(FS.stat(path).mode)
        } catch {
          return false
        }
      }

      function flushCoreSaveFiles() {
        try {
          window.EJS_emulator?.gameManager?.functions?.saveSaveFiles?.()
        } catch {
          // Some cores do not expose save RAM. A failed flush should not break state sync.
        }
      }

      function currentStateSlot() {
        return String(
          window.EJS_emulator?.getSettingValue?.('save-state-slot') ||
            window.EJS_emulator?.settings?.['save-state-slot'] ||
            '1',
        )
      }

      function ensureEmulatorDirectory(path) {
        const parts = path.split('/')
        let current = ''
        for (let index = 0; index < parts.length - 1; index += 1) {
          const segment = parts[index]
          if (!segment) continue
          current += `/${segment}`
          if (!window.EJS_emulator.gameManager.FS.analyzePath(current).exists) {
            window.EJS_emulator.gameManager.FS.mkdir(current)
          }
        }
      }

      function addRuntimeSaveFile(files, seen, path, bytes) {
        const normalizedPath = normalizeEmulatorPath(path, '/data/saves/save.ram')
        if (!normalizedPath || !bytes || bytes.length === 0 || seen.has(normalizedPath)) return
        seen.add(normalizedPath)
        files.push({ path: normalizedPath, base64: bytesToBase64(bytes) })
      }

      function collectDirectorySaveFiles(root, files, seen) {
        const FS = window.EJS_emulator?.gameManager?.FS
        if (!FS || !pathExists(root) || !isDirectory(root)) return
        for (const entry of FS.readdir(root)) {
          if (entry === '.' || entry === '..') continue
          const childPath = `${root.replace(/\/$/, '')}/${entry}`
          if (isDirectory(childPath)) {
            collectDirectorySaveFiles(childPath, files, seen)
            continue
          }
          try {
            addRuntimeSaveFile(files, seen, childPath, FS.readFile(childPath))
          } catch {
            // Ignore transient files that cannot be read while the core is updating saves.
          }
        }
      }

      function collectSaveFiles(payloadSave = null) {
        const FS = window.EJS_emulator?.gameManager?.FS
        const files = []
        const seen = new Set()
        if (!FS) return files

        const primaryPath = normalizeEmulatorPath(saveFilePath() || latestSavePath, '/data/saves/save.ram')
        if (payloadSave) {
          addRuntimeSaveFile(files, seen, primaryPath, payloadSave)
        }
        if (primaryPath && pathExists(primaryPath) && !isDirectory(primaryPath)) {
          try {
            addRuntimeSaveFile(files, seen, primaryPath, FS.readFile(primaryPath))
          } catch {
            // Fall through to directory collection.
          }
        }
        collectDirectorySaveFiles('/data/saves', files, seen)
        return files
      }

      function writeSaveFiles(files) {
        const saveFiles = Array.isArray(files) ? files.filter((file) => file?.base64) : []
        if (saveFiles.length === 0) {
          throw new Error('No EmulatorJS save file was provided.')
        }
        for (const [index, file] of saveFiles.entries()) {
          const normalizedPath = normalizeEmulatorPath(file.path, index === 0 ? saveFilePath() : `save-${index}.ram`)
          if (!normalizedPath) continue
          const bytes = base64ToBytes(file.base64)
          ensureEmulatorDirectory(normalizedPath)
          if (window.EJS_emulator.gameManager.FS.analyzePath(normalizedPath).exists) {
            window.EJS_emulator.gameManager.FS.unlink(normalizedPath)
          }
          window.EJS_emulator.gameManager.FS.writeFile(normalizedPath, bytes)
          if (index === 0) {
            latestSavePath = normalizedPath
            latestSaveBase64 = file.base64
          }
        }
        window.EJS_emulator.gameManager.loadSaveFiles()
      }

      function exportSnapshot(requestId) {
        try {
          flushCoreSaveFiles()
          const files = collectSaveFiles()
          if (files.length === 0 && latestSavePath && latestSaveBase64) {
            postBridgeMessage({
              type: 'export-result',
              requestId,
              snapshot: {
                files: [{ path: latestSavePath, base64: latestSaveBase64 }],
              },
            })
            return
          }
          if (files.length === 0) {
            postBridgeMessage({ type: 'export-result', requestId, snapshot: { files: [] } })
            return
          }
          latestSavePath = files[0].path
          latestSaveBase64 = files[0].base64
          postBridgeMessage({
            type: 'export-result',
            requestId,
            snapshot: {
              files,
            },
          })
        } catch (error) {
          postBridgeMessage({
            type: 'export-result',
            requestId,
            error: error instanceof Error ? error.message : 'Unable to export EmulatorJS saves.',
          })
        }
      }

      function importSnapshot(requestId, files) {
        try {
          writeSaveFiles(files)
          postBridgeMessage({ type: 'import-result', requestId, ok: true })
        } catch (error) {
          postBridgeMessage({
            type: 'import-result',
            requestId,
            ok: false,
            error: error instanceof Error ? error.message : 'Unable to import EmulatorJS saves.',
          })
        }
      }

      async function saveNativeState(slot, state, quiet = false) {
        if (!state) {
          if (!quiet) displayMessage('No state data to sync.')
          return
        }
        const reply = await requestParent(
          { type: 'native-save-state', slot: String(slot || '1'), stateBase64: bytesToBase64(state) },
          ['native-save-result'],
        )
        if (!reply.ok) {
          throw new Error(reply.error || 'Unable to sync save state.')
        }
        if (!quiet) displayMessage(`Synced save state slot ${slot || '1'}.`)
      }

      async function loadNativeState(slot) {
        const effectiveSlot = String(slot || '1')
        const reply = await requestParent(
          { type: 'native-load-state', slot: effectiveSlot },
          ['native-load-state-result'],
        )
        if (!reply.ok) {
          throw new Error(reply.error || 'Unable to load synced save state.')
        }
        if (!reply.stateBase64) {
          throw new Error(`No synced save state in slot ${effectiveSlot}.`)
        }
        window.EJS_emulator.gameManager.loadState(base64ToBytes(reply.stateBase64))
        displayMessage(`Loaded synced save state slot ${effectiveSlot}.`)
      }

      async function saveNativeRam(save, quiet = false, options = {}) {
        if (options.flushCore) {
          flushCoreSaveFiles()
        }
        const files = collectSaveFiles(save)
        if (files.length === 0) {
          if (!quiet) displayMessage('No save RAM data to sync.')
          return
        }
        const reply = await requestParent(
          { type: 'native-save-ram', files },
          ['native-save-result'],
        )
        if (!reply.ok) {
          throw new Error(reply.error || 'Unable to sync save RAM.')
        }
        latestSavePath = files[0].path
        latestSaveBase64 = files[0].base64
        if (!quiet) displayMessage('Synced save RAM.')
      }

      async function loadNativeRam(quiet = false) {
        const reply = await requestParent({ type: 'native-load-ram' }, ['native-load-ram-result'])
        if (!reply.ok) {
          throw new Error(reply.error || 'Unable to load synced save RAM.')
        }
        if (!Array.isArray(reply.files) || reply.files.length === 0) {
          if (quiet) return false
          throw new Error('No synced save RAM found.')
        }
        writeSaveFiles(reply.files)
        if (!quiet) displayMessage('Loaded synced save RAM.')
        return true
      }

      function queueSaveRamSync(payload = {}) {
        pendingSaveRamPayload = payload || {}
        if (saveRamSyncTimer) {
          window.clearTimeout(saveRamSyncTimer)
        }
        saveRamSyncTimer = window.setTimeout(() => {
          void flushSaveRamSync()
        }, 1000)
      }

      async function flushSaveRamSync() {
        if (saveRamSyncInFlight || !pendingSaveRamPayload) return
        const payload = pendingSaveRamPayload
        pendingSaveRamPayload = null
        saveRamSyncInFlight = true
        try {
          await saveNativeRam(payload?.save, true, { flushCore: !payload?.save })
        } catch (error) {
          displayMessage(error instanceof Error ? error.message : 'Unable to sync save RAM.')
        } finally {
          saveRamSyncInFlight = false
          if (pendingSaveRamPayload) {
            void flushSaveRamSync()
          }
        }
      }

      function startSaveRamAutoSync() {
        if (saveRamAutoSyncTimer) return
        window.setTimeout(() => queueSaveRamSync({}), 5000)
        saveRamAutoSyncTimer = window.setInterval(() => queueSaveRamSync({}), 30000)
      }

      window.addEventListener('pagehide', () => {
        if (!saveRamAutoSyncTimer) return
        queueSaveRamSync({})
        void flushSaveRamSync()
      })

      window.addEventListener('message', (event) => {
        if (event.origin !== runtimeOrigin) return
        const message = event.data
        if (!message || typeof message !== 'object' || !('type' in message)) return
        if (message.requestId && pendingNativeRequests.has(message.requestId)) {
          const pending = pendingNativeRequests.get(message.requestId)
          if (pending.responseTypes.includes(message.type)) {
            pendingNativeRequests.delete(message.requestId)
            pending.resolve(message)
            return
          }
        }
        if (message.type === 'export-save-snapshot') {
          exportSnapshot(message.requestId)
        } else if (message.type === 'import-save-snapshot') {
          importSnapshot(message.requestId, message.files)
        }
      })

      if (!sessionId) {
        renderError('Missing browser-play session token.')
      } else {
        const raw = sessionStorage.getItem(`mga.browserPlaySession.${sessionId}`)
        if (!raw) {
          renderError('Browser-play session was not found.')
        } else {
          const session = JSON.parse(raw)
          if (session.runtime !== 'emulatorjs') {
            renderError('Invalid EmulatorJS session payload.')
          } else {
            const runtimeVersion = 'mga-20260430-save-ram-sync'
            const runtimeDataUrl = new URL('./data/', window.location.href)
            const loaderUrl = new URL('./data/loader.js', window.location.href)
            const emulatorScriptUrl = new URL('./data/emulator.min.js', window.location.href)
            const emulatorStyleUrl = new URL('./data/emulator.min.css', window.location.href)
            loaderUrl.searchParams.set('v', runtimeVersion)
            emulatorScriptUrl.searchParams.set('v', runtimeVersion)
            emulatorStyleUrl.searchParams.set('v', runtimeVersion)
            window.EJS_ready = () => {
              scheduleResizePass()
              postBridgeMessage({
                type: 'ready',
                saveAdapter: true,
                nativeSaveSync: session.nativeSaveSync === true,
              })
            }
            window.EJS_onGameStart = () => {
              scheduleResizePass()
              if (session.nativeSaveSync === true) {
                void loadNativeRam(true)
                  .catch((error) => {
                    displayMessage(error instanceof Error ? error.message : 'Unable to load synced save RAM.')
                  })
                  .finally(() => {
                    startSaveRamAutoSync()
                  })
              }
            }
            if (session.nativeSaveSync === true) {
              window.EJS_onSaveState = (payload) => {
                void saveNativeState(currentStateSlot(), payload?.state).catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to sync save state.')
                })
              }
              window.EJS_onLoadState = () => {
                void loadNativeState(currentStateSlot()).catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to load synced save state.')
                })
              }
              window.EJS_onQuickSaveState = (payload) => {
                void saveNativeState(payload?.slot || currentStateSlot(), payload?.state, true).catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to sync quick-save state.')
                })
              }
              window.EJS_onQuickLoadState = (payload) => {
                void loadNativeState(payload?.slot || currentStateSlot()).catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to load synced quick-save state.')
                })
              }
              window.EJS_onSaveSave = (payload) => {
                void saveNativeRam(payload?.save, false).catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to sync save RAM.')
                })
              }
              window.EJS_onLoadSave = () => {
                void loadNativeRam().catch((error) => {
                  displayMessage(error instanceof Error ? error.message : 'Unable to load synced save RAM.')
                })
              }
              window.EJS_onSaveUpdate = (payload) => {
                queueSaveRamSync(payload)
              }
            }
            window.EJS_player = '#game'
            window.EJS_core = session.core
            window.EJS_gameUrl = session.gameUrl
            window.EJS_gameName = session.gameName
            window.EJS_pathtodata = runtimeDataUrl.href
            window.EJS_paths = {
              'emulator.min.js': emulatorScriptUrl.href,
              'emulator.min.css': emulatorStyleUrl.href,
            }
            window.EJS_startOnLoaded = true
            // Fullscreen-on-load usually gets blocked by the browser and leaves
            // the runtime controls in the wrong state. Enter fullscreen manually.
            window.EJS_fullscreenOnLoaded = false
            window.EJS_disableAutoLang = false
            window.EJS_DEBUG_XX = false
            await import(loaderUrl.href)
          }
        }
      }
    </script>
  </body>
</html>
