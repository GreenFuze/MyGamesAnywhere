openapi: 3.0.3
info:
  title: MyGamesAnywhere Server API
  description: Public HTTP API for the MyGamesAnywhere desktop app server.
  version: 1.0.0
paths:

  /api/about:
    get:
      summary: Application build metadata
      description: Returns the server's authoritative app version information, including version, commit, build date, and author credits.
      responses:
        200:
          description: AboutInfo JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/about/license:
    get:
      summary: Open-source license text
      description: Streams the repository license file used by the About page.
      responses:
        200:
          description: License text
        400:
          description: Error response
        500:
          description: License file not found

  /api/auth/callback/{plugin_id}:
    get:
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/config/frontend:
    get:
      summary: Get frontend preferences
      description: Returns stored SPA preferences as a JSON object; {} if unset or invalid.
      responses:
        200:
          description: JSON object
        400:
          description: Error response
        500:
          description: Internal server error
    post:
      summary: Set frontend preferences
      description: Upserts SPA preferences as a single JSON object (theme, layout, active save-sync integration, etc.). Stored under key frontend.
      requestBody:
        description: JSON object (any keys). Max size enforced by server.
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Saved
        400:
          description: Not a JSON object or too large
        500:
          description: Internal server error

  /api/config/{key}:
    post:
      summary: Set config value
      description: Upserts a configuration value by key (e.g. google_drive_creds).
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { "value": "string" }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Value set
        400:
          description: Invalid body
        500:
          description: Internal server error

  /api/events:
    get:
      summary: Server-Sent Events stream
      description: Opens a long-lived text/event-stream connection. Emits scan pipeline events (see server/internal/events/scan_events.md), app notifications (integrations, sync, plugin exit, coarse errors; see server/internal/events/notification_events.md), and save-sync migration lifecycle events (`save_sync_migration_started`, `save_sync_migration_progress`, `save_sync_migration_completed`, `save_sync_migration_failed`). Scan payloads include `job_id` so clients can recover in-progress jobs after reload. Each data line is JSON; map payloads include a ts field (RFC3339) when the publisher includes one.
      responses:
        200:
          description: text/event-stream; connection stays open until client disconnect or server shutdown
        400:
          description: Error response
        500:
          description: Streaming not supported

  /api/games:
    delete:
      summary: Delete all games
      description: Removes all games and their files from the database. Use before a full rescan to start fresh.
      responses:
        200:
          description: All games deleted
        400:
          description: Error response
        500:
          description: Internal server error
    get:
      summary: List games (paginated)
      description: 'Returns total, page, page_size and games[] as full detail objects (same shape as GET /api/games/{id}/detail) for library grids/tables. Query: page (0-based, default 0), page_size (default 100, max 2000). page_size=0 requests all games in one response (rejected if library exceeds 20000 games; use pagination). Totals also available via GET /api/stats (canonical_game_count).'
      responses:
        200:
          description: 'ListGamesResponse: total, page, page_size, games (GameDetailResponse[])'
        400:
          description: Invalid query or library too large for page_size=0
        500:
          description: Internal server error

  /api/games/{id}:
    get:
      summary: Get game by ID
      description: Returns full game detail (same JSON as GET /api/games/{id}/detail and each element of GET /api/games).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: GameDetailResponse
        400:
          description: Error response
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/achievements:
    get:
      summary: Get achievements for a game
      description: Fetches achievements on-demand from all achievement-capable plugins that have an external ID match for this game. Returns an array of achievement sets, one per source (steam, xbox, retroachievements).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Array of achievement sets
        400:
          description: id required
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/detail:
    get:
      summary: Get game detail
      description: Full metadata, media (with local_path/hash when known), external IDs, merged files, generic play metadata (play availability, launch sources, launch candidates, file ids), unified Xbox/xCloud fields (is_game_pass, xcloud_available, store_product_id, xcloud_url when present), and all source games with resolver_matches (including metadata_json).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Game detail object
        400:
          description: Error response
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/play:
    get:
      summary: Stream one game file by file_id
      description: Streams a single file that belongs to the requested canonical game. Requires query param file_id (stable id from game detail/list file metadata). Local-disk Phase 6 implementation only; rejects invalid ids, path traversal, and files outside the game's found source roots. Supports Range requests via http.ServeContent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Binary stream
        400:
          description: Missing or invalid file_id
        404:
          description: Game, file, or source path not found
        500:
          description: Internal server error

  /api/games/{id}/save-sync/slots:
    get:
      summary: List save-sync slots for one browser runtime source
      description: 'Returns summary metadata for `autosave` and `slot-1` through `slot-5` for the requested canonical game, source game, runtime, and save-sync integration. Query params: integration_id, source_game_id, runtime.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: JSON object with slots[] of SaveSyncSlotSummary
        400:
          description: Missing or invalid integration_id, source_game_id, or runtime
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/save-sync/slots/{slot_id}:
    get:
      summary: Get one remote save-sync slot snapshot
      description: 'Loads the manifest metadata and opaque zip snapshot for one browser-runtime save slot. Query params: integration_id, source_game_id, runtime.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SaveSyncSnapshot JSON
        400:
          description: Missing or invalid parameters
        404:
          description: Slot or game not found
        500:
          description: Internal server error
    put:
      summary: Store one remote save-sync slot snapshot
      description: Uploads a whole runtime save snapshot for a single slot. The server validates ownership, runtime compatibility, file manifest integrity, and optional conflict state via `base_manifest_hash`. Use `force=true` to overwrite after a conflict warning.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { integration_id, source_game_id, runtime, base_manifest_hash?, force?, snapshot: { canonical_game_id?, source_game_id?, runtime?, slot_id?, files[], archive_base64 } }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: SaveSyncPutResult JSON
        400:
          description: Invalid parameters or snapshot payload
        404:
          description: Game or slot target not found
        409:
          description: SaveSyncPutResult with conflict metadata
        500:
          description: Internal server error

  /api/integrations:
    get:
      summary: List integrations
      description: Returns all configured integrations (plugin instances) with id, plugin_id, label, integration_type, config.
      responses:
        200:
          description: Array of integrations
        400:
          description: Error response
        500:
          description: Internal server error
    post:
      summary: Create integration
      description: Creates a new integration (plugin instance). Validates config against plugin schema and plugin.check_config before persisting.
      requestBody:
        description: 'JSON: { "plugin_id": "string", "label": "string", "integration_type": "source"|"metadata"|..., "config": {} }'
        content:
          application/json:
            schema:
              type: object
      responses:
        201:
          description: Integration created (body is the integration)
        400:
          description: Validation error (missing/invalid plugin_id, label, integration_type, or config)
        409:
          description: 'duplicate_integration: same plugin_id and equivalent config JSON (body includes integration_id and integration)'
        500:
          description: Internal server error

  /api/integrations/status:
    get:
      summary: Integration status
      description: Returns status for each integration (ok, error, unavailable) by calling plugin.check_config.
      responses:
        200:
          description: Array of { integration_id, plugin_id, label, status, message }
        400:
          description: Error response
        500:
          description: Internal server error

  /api/integrations/{id}:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/integrations/{id}/enriched-games:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/integrations/{id}/games:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/integrations/{id}/status:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/media/{assetID}:
    get:
      summary: Stream cached media file
      description: Serves a file from MEDIA_ROOT using media_assets.id and the row's local_path (must be relative, no '..'). Set MEDIA_ROOT in config (default ./media). Use media[].asset_id from game detail; supports Range requests via http.ServeContent.
      parameters:
        - name: assetID
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Binary stream
        400:
          description: Invalid id
        404:
          description: Unknown asset or missing file
        500:
          description: Internal server error

  /api/plugins:
    get:
      summary: List plugins
      description: Returns the list of discovered plugins with ID, version, and capabilities.
      responses:
        200:
          description: Array of plugin descriptors
        400:
          description: Error response
        500:
          description: Internal server error

  /api/plugins/{plugin_id}:
    get:
      summary: Get plugin by ID
      description: Returns a single plugin's descriptor including config schema.
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Plugin info
        400:
          description: plugin_id required
        404:
          description: Plugin not found
        500:
          description: Internal server error

  /api/plugins/{plugin_id}/browse:
    post:
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/save-sync/migrations:
    post:
      summary: Start a save-sync migration job
      description: Starts a background save migration from one save-sync integration to another. Supports `scope=all` or `scope=game`; `game` requires `canonical_game_id`. Progress and completion arrive over SSE and can also be polled by job id.
      requestBody:
        description: 'JSON: { source_integration_id, target_integration_id, scope: "all"|"game", canonical_game_id?, delete_source_after_success? }'
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: SaveSyncMigrationStatus JSON
        400:
          description: Invalid request body or unsupported scope
        500:
          description: Internal server error

  /api/save-sync/migrations/{job_id}:
    get:
      summary: Get save-sync migration job status
      description: Returns the latest in-memory status for a save-sync migration job, including counts for total, completed, migrated, skipped, and any terminal error.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SaveSyncMigrationStatus JSON
        400:
          description: Error response
        404:
          description: Unknown job id
        500:
          description: Internal server error

  /api/scan:
    get:
      summary: Run full scan
      description: 'Same as POST /api/scan with no body: starts an asynchronous full-library scan job across all game source integrations.'
      responses:
        202:
          description: ScanJobStatus JSON
        400:
          description: Error response
        409:
          description: Another scan job is already active; returns the active ScanJobStatus
        500:
          description: Internal server error
    post:
      summary: Run scan
      description: 'Starts an asynchronous scan job. Runs discovery: calls each source plugin (source.library.list) and, for integrations with root_path in config, runs the local inventory pipeline. Optional body limits which sources to scan or requests metadata-only refresh.'
      requestBody:
        description: 'Optional JSON: { "game_sources": ["integration-id-1", ...], "metadata_only": true|false }. Omitted or empty game_sources = scan all sources.'
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: ScanJobStatus JSON
        400:
          description: Invalid JSON body
        409:
          description: Another scan job is already active; returns the active ScanJobStatus
        500:
          description: Internal server error

  /api/scan/jobs/{job_id}:
    get:
      summary: Get scan job status
      description: Returns the current in-memory status for an asynchronous scan job, including state, integration-level progress snapshots, a rolling recent-events log, current integration, report id, and any terminal error.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ScanJobStatus JSON
        400:
          description: job_id is required
        404:
          description: Unknown job id
        500:
          description: Internal server error

  /api/scan/jobs/{job_id}/cancel:
    post:
      summary: Cancel a running scan job
      description: Requests cancellation for an asynchronous scan job. Returns the updated ScanJobStatus. Jobs transition through cancelling and then cancelled if the worker exits due to context cancellation.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ScanJobStatus JSON; job was already cancelling or cancelled
        202:
          description: ScanJobStatus JSON; cancellation requested
        400:
          description: job_id is required
        404:
          description: Unknown job id
        409:
          description: ScanJobStatus JSON; job is already completed or failed
        500:
          description: Internal server error

  /api/scan/reports:
    get:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/scan/reports/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/stats:
    get:
      summary: Library statistics
      description: 'Single JSON document: canonical and source game counts, breakdowns by platform/kind/integration/plugin, metadata coverage, decade and genre summaries, and canonical-game coverage for media and achievements.'
      responses:
        200:
          description: LibraryStats JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/sync/key:
    delete:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    post:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/sync/pull:
    post:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/sync/push:
    post:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/sync/status:
    get:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /health:
    get:
      summary: Health check
      description: Returns 200 OK if the server is running. No body.
      responses:
        200:
          description: Server is healthy
        400:
          description: Error response
        500:
          description: Error response
