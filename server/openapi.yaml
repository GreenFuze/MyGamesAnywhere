openapi: 3.0.3
info:
  title: MyGamesAnywhere Server API
  description: Public HTTP API for the MyGamesAnywhere desktop app server.
  version: 1.0.0
paths:

  /*:
    connect:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    delete:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    get:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    head:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    options:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    patch:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    post:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    put:
      responses:
        400:
          description: Error response
        500:
          description: Error response
    trace:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/about:
    get:
      summary: Application build metadata
      description: Returns the server's authoritative app version information, including version, commit, build date, and author credits.
      responses:
        200:
          description: AboutInfo JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/about/license:
    get:
      summary: Open-source license text
      description: Streams the repository license file used by the About page.
      responses:
        200:
          description: License text
        400:
          description: Error response
        500:
          description: License file not found

  /api/achievements:
    get:
      summary: Get cached achievements dashboard
      description: Returns cached achievement totals by system and by canonical game. This endpoint only reads stored achievement cache rows and does not fetch achievements from external integrations.
      responses:
        200:
          description: AchievementsDashboardResponse
        400:
          description: Error response
        500:
          description: Internal server error

  /api/achievements/explorer:
    get:
      summary: Get cached achievements explorer
      description: Returns cached achievement sets and achievement rows grouped by canonical game. This endpoint is read-only over stored cache rows and does not trigger provider fetches.
      responses:
        200:
          description: AchievementsExplorerResponse
        400:
          description: Error response
        500:
          description: Internal server error

  /api/auth/callback/import:
    post:
      summary: Import pasted OAuth callback URL
      description: Completes an OAuth2 or OpenID-style plugin consent flow when the provider callback cannot reach MGA automatically. The client posts the final callback URL copied from the browser address bar; MGA validates the callback path, plugin id, and pending state, then invokes the same auth.oauth.callback plugin method used by direct redirects.
      requestBody:
        description: 'JSON: { plugin_id: string, callback_url: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Status ok JSON
        400:
          description: Malformed URL, wrong callback path/plugin, missing or stale state, provider denial, or plugin callback failure
        500:
          description: Internal server error

  /api/auth/callback/{plugin_id}:
    get:
      summary: Handle OAuth callback for a plugin
      description: Consumes the browser redirect callback for OAuth2 or OpenID-style plugin consent flows, invokes auth.oauth.callback on the plugin, publishes oauth_complete or oauth_error over SSE, and returns a small HTML page that closes the tab.
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: HTML callback result page
        400:
          description: Error response
        500:
          description: Internal server error

  /api/cache/clear:
    post:
      summary: Clear all cached source entries
      description: Deletes all reusable cache entries and removes the materialized cache root contents.
      responses:
        200:
          description: Status ok JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/cache/entries:
    get:
      summary: List cached source entries
      description: Returns all reusable cache entries with operator-facing metadata such as integration label, source context, profile, status, size, and timestamps.
      responses:
        200:
          description: JSON object with entries[] of cache entry DTOs
        400:
          description: Error response
        500:
          description: Internal server error

  /api/cache/entries/{entry_id}:
    delete:
      summary: Evict one cached source entry
      description: Deletes one cache entry, its tracked files, and the materialized files on disk.
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      responses:
        204:
          description: Entry deleted
        400:
          description: entry_id is required
        500:
          description: Internal server error

  /api/cache/jobs:
    get:
      summary: List recent cache prepare jobs
      description: 'Returns recent cache prepare/materialization jobs in reverse-updated order. Query: limit (optional, defaults to 25).'
      responses:
        200:
          description: JSON object with jobs[] of SourceCacheJobStatus
        400:
          description: Error response
        500:
          description: Internal server error

  /api/cache/jobs/{job_id}:
    get:
      summary: Get one cache prepare job
      description: Returns persisted status for one cache prepare/materialization job, including progress, terminal error, and entry linkage when ready.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SourceCacheJobStatus JSON
        400:
          description: job_id is required
        404:
          description: Job not found
        500:
          description: Internal server error

  /api/config/frontend:
    get:
      summary: Get frontend preferences
      description: Returns stored SPA preferences as a JSON object; {} if unset or invalid.
      responses:
        200:
          description: JSON object
        400:
          description: Error response
        500:
          description: Internal server error
    post:
      summary: Set frontend preferences
      description: Upserts SPA preferences as a single JSON object (theme, layout, active save-sync integration, etc.). Stored under key frontend.
      requestBody:
        description: JSON object (any keys). Max size enforced by server.
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Saved
        400:
          description: Not a JSON object or too large
        500:
          description: Internal server error

  /api/config/{key}:
    post:
      summary: Set config value
      description: Upserts a configuration value by key (e.g. google_drive_creds).
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { "value": "string" }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Value set
        400:
          description: Invalid body
        500:
          description: Internal server error

  /api/events:
    get:
      summary: Server-Sent Events stream
      description: Opens a long-lived text/event-stream connection. Emits scan pipeline events (see server/internal/events/scan_events.md), app notifications (integrations, sync, plugin exit, coarse errors; see server/internal/events/notification_events.md), and save-sync migration lifecycle events (`save_sync_migration_started`, `save_sync_migration_progress`, `save_sync_migration_completed`, `save_sync_migration_failed`). Scan payloads include `job_id` so clients can recover in-progress jobs after reload. Each data line is JSON; map payloads include a ts field (RFC3339) when the publisher includes one.
      responses:
        200:
          description: text/event-stream; connection stays open until client disconnect or server shutdown
        400:
          description: Error response
        500:
          description: Streaming not supported

  /api/games:
    delete:
      summary: Delete all games
      description: Removes all games and their files from the database. Use before a full rescan to start fresh.
      responses:
        200:
          description: All games deleted
        400:
          description: Error response
        500:
          description: Internal server error
    get:
      summary: List games (paginated)
      description: 'Returns total, page, page_size and games[] as full detail objects (same shape as GET /api/games/{id}/detail) for library grids/tables. Query: page (0-based, default 0), page_size (default 100, max 2000). page_size=0 requests all games in one response (rejected if library exceeds 20000 games; use pagination). Totals also available via GET /api/stats (canonical_game_count).'
      responses:
        200:
          description: 'ListGamesResponse: total, page, page_size, games (GameDetailResponse[])'
        400:
          description: Invalid query or library too large for page_size=0
        500:
          description: Internal server error

  /api/games/{id}:
    get:
      summary: Get game by ID
      description: Returns full game detail (same JSON as GET /api/games/{id}/detail and each element of GET /api/games).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: GameDetailResponse
        400:
          description: Error response
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/achievements:
    get:
      summary: Get achievements for a game
      description: Fetches achievements on-demand from all achievement-capable plugins that have an external ID match for this game. Returns an array of achievement sets, one per source (steam, xbox, retroachievements).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Array of achievement sets
        400:
          description: id required
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/background-override:
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/games/{id}/cache/prepare:
    post:
      summary: Prepare cached source files for one delivery profile
      description: Starts or reuses a cache/materialization job for one source record and delivery profile. Direct sources may return an immediate completed response; remote materializable sources return 202 while the job downloads into the reusable source cache.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { source_game_id: string, profile: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: CachePrepareResponse JSON; source already ready or direct
        202:
          description: CachePrepareResponse JSON; job accepted
        400:
          description: Invalid game id, source_game_id, or profile
        404:
          description: Game not found
        500:
          description: Error response

  /api/games/{id}/cover-override:
    delete:
      summary: Clear game cover override
      description: Removes a pinned cover override for the canonical game and returns the updated game detail using normal cover selection again.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated GameDetailResponse
        400:
          description: Error response
        404:
          description: Game not found
        500:
          description: Internal server error
    put:
      summary: Set game cover override
      description: Pins one existing media asset that is already linked to the canonical game as the preferred cover. The server rejects media assets that are not linked to the requested game.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { media_asset_id: number }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Updated GameDetailResponse
        400:
          description: Invalid request body or media_asset_id
        404:
          description: Game not found
        422:
          description: Media asset is not linked to this game
        500:
          description: Internal server error

  /api/games/{id}/detail:
    get:
      summary: Get game detail
      description: Full metadata, media (with local_path/hash when known), external IDs, merged files, unified Xbox/xCloud fields (is_game_pass, xcloud_available, store_product_id, xcloud_url when present), and all source games with resolver_matches. Source records also include generic delivery metadata per profile (`delivery.profiles`) so clients can decide whether a source is direct, materialized, or unavailable. Legacy browser-play fields remain as a compatibility shim.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Game detail object
        400:
          description: Error response
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/favorite:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/games/{id}/hover-override:
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/games/{id}/play:
    get:
      summary: Stream one game file by file_id
      description: Streams a single file that belongs to the requested canonical game. Requires query param file_id (stable id from game detail/list file metadata). Direct local sources stream immediately; materialized sources such as SMB/Drive require `profile` so the server can open the prepared cached file. Supports GET, HEAD, and Range requests via http.ServeContent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Binary stream
        400:
          description: Missing or invalid file_id
        404:
          description: Game, file, source path, or prepared cache file not found
        500:
          description: Internal server error
    head:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/games/{id}/refresh-metadata:
    post:
      summary: Refresh metadata for one canonical game
      description: Runs the strict metadata/media refresh flow for one canonical game. Provider failures abort the refresh and return a fast-fail error instead of partial persistence.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated GameDetailResponse
        400:
          description: Error response
        404:
          description: Game not found
        409:
          description: No eligible source records remain for refresh
        422:
          description: Metadata providers unavailable or refresh failed fast
        500:
          description: Internal server error

  /api/games/{id}/save-sync/prefetch:
    post:
      summary: Prefetch save-sync slots into the local cache
      description: Starts a background prefetch of EmulatorJS save-sync slots from the active remote integration into the server local cache. Missing remote slots are cached as empty; provider failures fail the job.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { integration_id, source_game_id, runtime }'
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: SaveSyncPrefetchStatus JSON
        400:
          description: Invalid parameters
        500:
          description: Internal server error

  /api/games/{id}/save-sync/slots:
    get:
      summary: List save-sync slots for one browser runtime source
      description: 'Returns local cached summary metadata for save-sync slots for the requested canonical game, source game, runtime, and save-sync integration. Query params: integration_id, source_game_id, runtime.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: JSON object with slots[] of SaveSyncSlotSummary
        400:
          description: Missing or invalid integration_id, source_game_id, or runtime
        404:
          description: Game not found
        500:
          description: Internal server error

  /api/games/{id}/save-sync/slots/{slot_id}:
    get:
      summary: Get one cached save-sync slot snapshot
      description: 'Loads the manifest metadata and opaque zip snapshot for one browser-runtime save slot from the server local cache. Query params: integration_id, source_game_id, runtime.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SaveSyncSnapshot JSON
        400:
          description: Missing or invalid parameters
        404:
          description: Slot or game not found
        500:
          description: Internal server error
    put:
      summary: Store one save-sync slot snapshot
      description: Stores a whole runtime save snapshot into the local server cache and queues a cloud upload. The server validates ownership, runtime compatibility, file manifest integrity, and optional conflict state via `base_manifest_hash`. Use `force=true` to overwrite after a conflict warning.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { integration_id, source_game_id, runtime, base_manifest_hash?, force?, snapshot: { canonical_game_id?, source_game_id?, runtime?, slot_id?, files[], archive_base64 } }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: SaveSyncPutResult JSON
        400:
          description: Invalid parameters or snapshot payload
        404:
          description: Game or slot target not found
        409:
          description: SaveSyncPutResult with conflict metadata
        500:
          description: Internal server error

  /api/games/{id}/sources/{source_game_id}:
    delete:
      summary: Hard delete one source record
      description: Deletes exactly one eligible file-backed source record, including provider-backed files and dependent database rows, then recomputes canonical grouping. The action never deletes sibling source records implicitly.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: source_game_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: DeleteSourceGameResponse
        400:
          description: Error response
        404:
          description: Game or source record not found
        409:
          description: Source record is not eligible for hard delete
        500:
          description: Internal server error

  /api/games/{id}/sources/{source_game_id}/delete-preview:
    post:
      summary: Preview hard delete for one source record
      description: Calls the file-backed source plugin in dry-run mode with the real delete arguments and returns the plugin-resolved file deletion plan without deleting files or database rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: source_game_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: DeleteSourceGamePreview JSON
        400:
          description: Error response
        404:
          description: Game or source record not found
        409:
          description: Source record is not eligible for hard delete
        500:
          description: Internal server error

  /api/integration-refresh/jobs/{job_id}:
    get:
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/integrations:
    get:
      summary: List integrations
      description: Returns all configured integrations (plugin instances) with id, plugin_id, label, integration_type, config.
      responses:
        200:
          description: Array of integrations
        400:
          description: Error response
        500:
          description: Internal server error
    post:
      summary: Create integration
      description: Creates a new integration (plugin instance). Validates config against plugin schema and plugin.check_config before persisting.
      requestBody:
        description: 'JSON: { "plugin_id": "string", "label": "string", "integration_type": "source"|"metadata"|..., "config": {} }'
        content:
          application/json:
            schema:
              type: object
      responses:
        201:
          description: Integration created (body is the integration)
        400:
          description: Validation error (missing/invalid plugin_id, label, integration_type, or config)
        409:
          description: 'duplicate_integration: same plugin_id and equivalent config JSON (body includes integration_id and integration)'
        500:
          description: Internal server error

  /api/integrations/status:
    get:
      summary: Integration status
      description: Returns status for each integration (ok, error, unavailable) by calling plugin.check_config.
      responses:
        200:
          description: Array of { integration_id, plugin_id, label, status, message }
        400:
          description: Error response
        500:
          description: Internal server error

  /api/integrations/{id}:
    delete:
      summary: Delete one integration
      description: Deletes the integration. If the plugin has source capability, the server also cascade-deletes associated source games and related child rows before removing the integration.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        204:
          description: Integration deleted
        400:
          description: id is required
        404:
          description: Integration not found
        500:
          description: Internal server error
    put:
      summary: Update one integration
      description: Updates selected integration fields. Label and integration_type are merged when present; config is optional but, when supplied, must remain a JSON object that passes schema validation and plugin.check_config. OAuth-backed plugins may return oauth_required so the frontend can complete consent before retrying the save.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { label?, integration_type?, config? }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Updated integration JSON
        202:
          description: OAuthRequiredResponse JSON with authorize_url and state
        400:
          description: Invalid id, JSON body, or config
        404:
          description: Integration not found
        500:
          description: Internal server error

  /api/integrations/{id}/authorize:
    post:
      summary: Start or resume OAuth for one integration
      description: Validates the saved config for one integration and either returns its current status or, when browser consent is still required, returns the same oauth_required payload used by create so the frontend can open the authorization URL.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: IntegrationStatusEntry JSON when no browser auth step is needed
        202:
          description: OAuthRequiredResponse JSON with authorize_url and state
        400:
          description: Invalid id or saved config
        404:
          description: Integration not found
        500:
          description: Internal server error

  /api/integrations/{id}/enriched-games:
    get:
      summary: List games enriched by one metadata integration
      description: Resolves the saved integration to its plugin_id and returns lightweight canonical game rows enriched by that metadata provider's plugin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Array of GameListItem JSON
        400:
          description: id is required
        404:
          description: Integration not found
        500:
          description: Internal server error

  /api/integrations/{id}/games:
    get:
      summary: List games discovered by one source integration
      description: Returns lightweight canonical game rows for games linked to the specified source integration. Intended for Settings drill-down lists and quick inspection.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Array of GameListItem JSON
        400:
          description: id is required
        404:
          description: Integration not found
        500:
          description: Internal server error

  /api/integrations/{id}/refresh:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/integrations/{id}/status:
    get:
      summary: Validate one integration
      description: Runs plugin.check_config for one saved integration and returns a single IntegrationStatusEntry with status, label, and message.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: IntegrationStatusEntry JSON
        400:
          description: id is required
        404:
          description: Integration not found
        500:
          description: Internal server error

  /api/media/cache/clear:
    post:
      summary: Clear downloaded media cache
      description: Deletes local downloaded artwork/video files under MEDIA_ROOT, clears media local_path/hash and failure state, keeps media rows and library metadata, then enqueues media downloads again.
      responses:
        200:
          description: MediaDownloadStatus JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/media/queue/retry-failed:
    post:
      summary: Retry failed media downloads
      description: Clears retryable media download failures and enqueues pending media downloads in the background. Permanent failures remain untouched.
      responses:
        200:
          description: MediaDownloadStatus JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/media/queue/status:
    get:
      summary: Get media download queue status
      description: Returns DB-backed media download counts plus in-memory queued and downloading counts for the asynchronous media cache.
      responses:
        200:
          description: MediaDownloadStatus JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/media/{assetID}:
    get:
      summary: Stream cached media file
      description: Serves a file from MEDIA_ROOT using media_assets.id and the row's local_path (must be relative, no '..'). Set MEDIA_ROOT in config (default ./media). Use media[].asset_id from game detail; supports Range requests via http.ServeContent.
      parameters:
        - name: assetID
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Binary stream
        400:
          description: Invalid id
        404:
          description: Unknown asset or missing file
        500:
          description: Internal server error

  /api/media/{assetID}/metadata:
    put:
      summary: Backfill media dimensions
      description: Stores probed width/height metadata for an existing media asset so future clients can make layout decisions without probing again.
      parameters:
        - name: assetID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { width: number, height: number, mime_type?: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        204:
          description: Metadata updated
        400:
          description: Invalid id or body
        500:
          description: Internal server error

  /api/plugins:
    get:
      summary: List plugins
      description: Returns the list of discovered plugins with ID, version, and capabilities.
      responses:
        200:
          description: Array of plugin descriptors
        400:
          description: Error response
        500:
          description: Internal server error

  /api/plugins/{plugin_id}:
    get:
      summary: Get plugin by ID
      description: Returns a single plugin's descriptor including config schema.
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Plugin info
        400:
          description: plugin_id required
        404:
          description: Plugin not found
        500:
          description: Internal server error

  /api/plugins/{plugin_id}/browse:
    post:
      summary: Browse source paths via a plugin
      description: Proxies a source.browse IPC call to a plugin so the frontend can browse remote/local path trees during integration setup.
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { path: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Plugin-defined browse result JSON
        400:
          description: plugin_id required or invalid body
        500:
          description: Browse failed

  /api/plugins/{plugin_id}/check-config:
    post:
      summary: Validate draft plugin config
      description: Runs schema validation and plugin.check_config for a draft config without creating or updating an integration. OAuth-backed plugins may return oauth_required so the frontend can authenticate before enabling remote browsing.
      parameters:
        - name: plugin_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'JSON: { config: object }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Plugin check result JSON
        202:
          description: OAuthRequiredResponse JSON with authorize_url and state
        400:
          description: Invalid plugin id, JSON body, or config
        500:
          description: Internal server error

  /api/profiles:
    get:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/review-candidates:
    get:
      summary: List manual-review candidates
      description: 'Returns manual-review candidate summaries for the Undetected Games workflow. Query: scope (active or archive, default active) and limit (optional). Review state can be pending, matched, or not_a_game.'
      responses:
        200:
          description: Array of ManualReviewCandidateSummary JSON
        400:
          description: Invalid scope or limit
        500:
          description: Internal server error

  /api/review-candidates/redetect:
    post:
      summary: Re-detect active manual-review candidates
      description: Runs the strict automatic metadata re-detect workflow for all active pending manual-review candidates. Provider or workflow errors fail fast and return partial batch counts plus the candidate id that aborted the run.
      responses:
        200:
          description: ManualReviewRedetectBatchResult JSON
        400:
          description: Error response
        500:
          description: Fail-fast batch error with partial ManualReviewRedetectBatchResult JSON

  /api/review-candidates/{id}:
    get:
      summary: Get one manual-review candidate
      description: Returns full manual-review candidate detail including files, resolver matches, current review_state, and linked canonical game id when present.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ManualReviewCandidateDetail JSON
        400:
          description: id is required
        404:
          description: Candidate not found
        500:
          description: Internal server error

  /api/review-candidates/{id}/apply:
    post:
      summary: Apply a manual-review search result
      description: Persists a chosen manual-review metadata match for the candidate, marks review_state as matched, and updates the candidate detail that the UI should continue showing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: JSON manual-review search result object (provider ids, external_id, title, optional metadata fields).
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Updated ManualReviewCandidateDetail JSON
        400:
          description: Invalid body or missing id
        404:
          description: Candidate not found
        500:
          description: Internal server error

  /api/review-candidates/{id}/files:
    delete:
      summary: Delete a manual-review candidate's backing files
      description: Destructively deletes the filesystem-backed source files for one manual-review candidate, removes the candidate source record, and recomputes canonical membership.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ManualReviewDeleteCandidateFilesResponse JSON
        400:
          description: Missing id
        404:
          description: Candidate not found
        409:
          description: Candidate source is not eligible for destructive deletion
        500:
          description: Internal server error

  /api/review-candidates/{id}/files/delete-preview:
    post:
      summary: Preview delete for a manual-review candidate's backing files
      description: Calls the file-backed source plugin in dry-run mode with the real candidate file delete arguments and returns the plugin-resolved deletion plan without deleting files or database rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: DeleteSourceGamePreview JSON
        400:
          description: Missing id
        404:
          description: Candidate not found
        409:
          description: Candidate source is not eligible for destructive deletion
        500:
          description: Internal server error

  /api/review-candidates/{id}/not-a-game:
    post:
      summary: Archive a candidate as not a game
      description: Marks the candidate review_state as not_a_game and moves it out of the active Undetected Games queue while preserving the decision for later scan refreshes.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated ManualReviewCandidateDetail JSON
        400:
          description: Missing id
        404:
          description: Candidate not found
        500:
          description: Internal server error

  /api/review-candidates/{id}/redetect:
    post:
      summary: Re-detect one manual-review candidate
      description: Runs strict automatic metadata identify, consensus, and fill for one pending manual-review candidate. Identified results persist through the normal scan refresh path; unidentified results leave the candidate pending.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ManualReviewRedetectResponse JSON
        400:
          description: Missing id or candidate not eligible
        404:
          description: Candidate not found
        500:
          description: Metadata providers unavailable or internal server error

  /api/review-candidates/{id}/search:
    post:
      summary: Search metadata providers for a review candidate
      description: Runs a manual search across configured metadata providers for one candidate. If query is omitted, the server derives a best-effort title query from the candidate data.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: 'Optional JSON: { query?: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: ManualReviewSearchResponse JSON
        400:
          description: Invalid body or missing id
        404:
          description: Candidate not found
        500:
          description: Internal server error

  /api/review-candidates/{id}/unarchive:
    post:
      summary: Restore an archived manual-review candidate
      description: Moves an archived candidate back into the active queue and resets its review_state to pending so it can be worked again.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated ManualReviewCandidateDetail JSON
        400:
          description: Missing id
        404:
          description: Candidate not found
        500:
          description: Internal server error

  /api/save-sync/migrations:
    post:
      summary: Start a save-sync migration job
      description: Starts a background save migration from one save-sync integration to another. Supports `scope=all` or `scope=game`; `game` requires `canonical_game_id`. Progress and completion arrive over SSE and can also be polled by job id.
      requestBody:
        description: 'JSON: { source_integration_id, target_integration_id, scope: "all"|"game", canonical_game_id?, delete_source_after_success? }'
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: SaveSyncMigrationStatus JSON
        400:
          description: Invalid request body or unsupported scope
        500:
          description: Internal server error

  /api/save-sync/migrations/{job_id}:
    get:
      summary: Get save-sync migration job status
      description: Returns the latest in-memory status for a save-sync migration job, including counts for total, completed, migrated, skipped, and any terminal error.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SaveSyncMigrationStatus JSON
        400:
          description: Error response
        404:
          description: Unknown job id
        500:
          description: Internal server error

  /api/save-sync/prefetch/{job_id}:
    get:
      summary: Get save-sync prefetch job status
      description: Returns the latest in-memory status for a save-sync prefetch job, including progress, cached/missing/failed slot counts, and any terminal error.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: SaveSyncPrefetchStatus JSON
        400:
          description: Error response
        404:
          description: Unknown job id
        500:
          description: Internal server error

  /api/scan:
    get:
      summary: Run full scan
      description: 'Same as POST /api/scan with no body: starts an asynchronous full-library scan job across all game source integrations.'
      responses:
        202:
          description: ScanJobStatus JSON
        400:
          description: Error response
        409:
          description: Another scan job is already active; returns the active ScanJobStatus
        500:
          description: Internal server error
    post:
      summary: Run scan
      description: 'Starts an asynchronous scan job. Runs discovery: calls each source plugin (source.library.list) and, for integrations with root_path in config, runs the local inventory pipeline. Optional body limits which sources to scan or requests metadata-only refresh.'
      requestBody:
        description: 'Optional JSON: { "game_sources": ["integration-id-1", ...], "metadata_only": true|false }. Omitted or empty game_sources = scan all sources.'
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: ScanJobStatus JSON
        400:
          description: Invalid JSON body
        409:
          description: Another scan job is already active; returns the active ScanJobStatus
        500:
          description: Internal server error

  /api/scan/jobs/{job_id}:
    get:
      summary: Get scan job status
      description: Returns the current in-memory status for an asynchronous scan job, including state, integration-level progress snapshots, a rolling recent-events log, current integration, report id, and any terminal error.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ScanJobStatus JSON
        400:
          description: job_id is required
        404:
          description: Unknown job id
        500:
          description: Internal server error

  /api/scan/jobs/{job_id}/cancel:
    post:
      summary: Cancel a running scan job
      description: Requests cancellation for an asynchronous scan job. Returns the updated ScanJobStatus. Jobs transition through cancelling and then cancelled if the worker exits due to context cancellation.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ScanJobStatus JSON; job was already cancelling or cancelled
        202:
          description: ScanJobStatus JSON; cancellation requested
        400:
          description: job_id is required
        404:
          description: Unknown job id
        409:
          description: ScanJobStatus JSON; job is already completed or failed
        500:
          description: Internal server error

  /api/scan/reports:
    get:
      summary: List recent scan reports
      description: 'Returns the most recent persisted scan reports in reverse chronological order. Query: limit (optional, defaults to 10). Each report includes totals plus per-integration diff summaries.'
      responses:
        200:
          description: Array of ScanReport JSON objects
        400:
          description: Error response
        500:
          description: Internal server error

  /api/scan/reports/{id}:
    get:
      summary: Get one scan report
      description: Returns one persisted scan report by id, including totals, timing, metadata_only flag, and per-integration results.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: ScanReport JSON
        400:
          description: id is required
        404:
          description: Report not found
        500:
          description: Internal server error

  /api/setup/restore-sync:
    post:
      responses:
        400:
          description: Error response
        500:
          description: Error response

  /api/setup/restore-sync/browse:
    post:
      responses:
        400:
          description: Error response
        500:
