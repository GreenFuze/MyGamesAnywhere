  /api/stats:
    get:
      summary: Library statistics
      description: 'Single JSON document: canonical and source game counts, breakdowns by platform/kind/integration/plugin, metadata coverage, decade and genre summaries, and canonical-game coverage for media and achievements.'
      responses:
        200:
          description: LibraryStats JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/sync/key:
    delete:
      summary: Clear stored sync passphrase
      description: Deletes the locally stored sync key/passphrase without changing remote data.
      responses:
        200:
          description: Status ok JSON
        400:
          description: Error response
        500:
          description: Failed to clear sync key
    post:
      summary: Store sync passphrase locally
      description: Stores the sync passphrase/key for later push/pull operations so the frontend does not need to resend it every time. If a key is already stored and the new passphrase differs, current_passphrase is required and must match the stored key.
      requestBody:
        description: 'JSON: { passphrase: string, current_passphrase?: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Status ok JSON
        400:
          description: Invalid JSON body, missing passphrase, missing current passphrase, or incorrect current passphrase
        500:
          description: Failed to store sync key

  /api/sync/pull:
    post:
      summary: Pull and merge settings sync snapshot
      description: Downloads the latest remote sync payload, decrypts it, and merges integrations/settings into the local database. Optional passphrase in the body overrides any stored key for this request.
      requestBody:
        description: 'Optional JSON: { passphrase?: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: PullResult JSON
        400:
          description: Invalid JSON body
        500:
          description: Sync pull failed

  /api/sync/push:
    post:
      summary: Push settings sync snapshot
      description: Exports the local sync payload and uploads it through the configured sync integration. Optional passphrase in the body overrides any stored key for this request.
      requestBody:
        description: 'Optional JSON: { passphrase?: string }'
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: PushResult JSON
        400:
          description: Invalid JSON body
        500:
          description: Sync push failed

  /api/sync/status:
    get:
      summary: Get sync configuration status
      description: Returns whether settings sync is configured, whether an encrypted key/passphrase is already stored locally, and timestamps for the last push and pull operations when known.
      responses:
        200:
          description: SyncStatus JSON
        400:
          description: Error response
        500:
          description: Internal server error

  /api/update/apply:
    post:
      responses:
        400:
